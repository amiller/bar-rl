<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>BAR replay scrubber — 3D</title>
<style>
  html,body { margin:0; padding:0; background:#0a0a0a; color:#ddd;
              font:13px/1.4 ui-monospace, Menlo, monospace; height:100%; }
  #wrap { display:grid; grid-template-rows:auto 1fr auto; height:100%; }
  header { padding:8px 12px; border-bottom:1px solid #222; display:flex; gap:14px; align-items:center; }
  header input[type=file] { color:#ddd; font:inherit; }
  #status { color:#889; }
  #stage { position:relative; overflow:hidden; }
  #stage canvas { display:block; }
  footer { padding:8px 12px; border-top:1px solid #222; display:flex; gap:10px; align-items:center; }
  footer #scrub { flex:1; }
  footer button { background:#222; color:#ddd; border:1px solid #333; padding:4px 10px; cursor:pointer; border-radius:3px; font:inherit; }
  footer button:disabled { opacity:0.5; cursor:default; }
</style>
</head>
<body><div id="wrap">
<header>
  <strong>BAR 3D scrubber</strong>
  <select id="traceSel" style="background:#191919;color:#ddd;border:1px solid #333;padding:2px 6px;border-radius:3px;font:inherit"></select>
  <input type="file" id="trace" accept=".jsonl" style="display:none">
  <button id="filePick" style="background:#222;color:#ddd;border:1px solid #333;padding:2px 8px;border-radius:3px;font:inherit;cursor:pointer">file…</button>
  <span id="status">loading…</span>
</header>
<div id="stage"></div>
<footer>
  <button id="play">▶</button>
  <input type="range" id="scrub" min="0" max="0" step="1" value="0" disabled>
  <span id="frameLabel">f=–</span>
</footer>
</div>

<script type="importmap">
{ "imports": {
  "three": "https://esm.sh/three@0.159.0",
  "three/addons/": "https://esm.sh/three@0.159.0/examples/jsm/"
} }
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { MapControls } from 'three/addons/controls/MapControls.js';

const GLB = name => `https://cdn.jsdelivr.net/gh/icexuick/BAR-modelviewer@main/glb/${name}.glb`;

// BAR's eight team colors, roughly (looked at icontypes.lua eyeballed).
const TEAM_COLORS = [
  0x4a90ff, 0xff4040, 0x4ed070, 0xffe400,
  0xb060ff, 0x40d0d0, 0xff8000, 0xc0c0c0,
];

// ---- scene ----
const stage = document.getElementById('stage');
const scene = new THREE.Scene(); scene.background = new THREE.Color(0x0a0a0a);
const cam   = new THREE.PerspectiveCamera(45, 1, 1, 50000);
cam.position.set(2048, 1500, 4500); cam.lookAt(2048, 0, 2048);
const r = new THREE.WebGLRenderer({ antialias: true });
r.setPixelRatio(devicePixelRatio); stage.appendChild(r.domElement);
// MapControls = pan-drag + scroll-zoom-toward-cursor + right-button orbit;
// the right feel for a top-down RTS map. zoomToCursor is the single most
// important UX upgrade vs. plain OrbitControls.
const ctrl = new MapControls(cam, r.domElement);
ctrl.target.set(2048, 0, 2048);
ctrl.enableDamping = true; ctrl.dampingFactor = 0.12;
ctrl.zoomToCursor = true; ctrl.zoomSpeed = 1.6;
ctrl.maxPolarAngle = Math.PI * 0.49;   // never tilt below the ground
ctrl.minDistance = 80; ctrl.maxDistance = 12000;

scene.add(new THREE.HemisphereLight(0xbcd3ff, 0x4a4032, 0.85));
const sun = new THREE.DirectionalLight(0xffeed0, 1.8);
sun.position.set(3000, 4500, 1500); scene.add(sun);
// Brighter ambient overall so the texture-mq.jpg map reads at default zoom.
scene.add(new THREE.AmbientLight(0xffffff, 0.35));

// URL-tunable knobs so you can iterate without rebuilding:
//   ?unitScale=2     — model size (1 = native, 4 = chunky)
//   ?heightScale=600 — terrain displacement amplitude (engine units)
//   ?flat=1          — pin units to y=0 (skip terrain elevation from trace)
//   ?wireframe=1     — wireframe on the ground (debug; shows displacement)
const QP = new URLSearchParams(location.search);
const UNIT_SCALE   = +(QP.get('unitScale')   ?? 1.5);
const HEIGHT_SCALE = +(QP.get('heightScale') ?? 600);
const UNITS_FLAT   =  (QP.get('flat')        ?? '0') === '1';
const GROUND_WIRE  =  (QP.get('wireframe')   ?? '0') === '1';

// Ground plane sized to the map (defaults to 4096; updated from meta).
// Heavily segmented so the displacement map has somewhere to push to —
// 256×256 verts gives ~16 engine units per vertex on a 4096 map (plenty for
// silhouette hills, won't tax a midrange GPU).
let mapX = 4096, mapZ = 4096;
const GROUND_SEGS = 256;
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x1a1f1a, roughness: 1.0, flatShading: true,
  displacementScale: HEIGHT_SCALE, displacementBias: 0,
  wireframe: GROUND_WIRE,
});
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(mapX, mapZ, GROUND_SEGS, GROUND_SEGS), groundMat);
ground.rotation.x = -Math.PI/2; ground.position.set(mapX/2, 0, mapZ/2); scene.add(ground);

const texLoader = new THREE.TextureLoader();
texLoader.crossOrigin = 'anonymous';
function setMapTexture(scriptName) {
  if (!scriptName) return;
  // BAR's API expects lowercase + spaces→underscores: "Great Divide V1" → great_divide_v1
  const file = scriptName.toLowerCase().replace(/\s+/g, '_');
  const baseUrl = `https://api.bar-rts.com/maps/${encodeURIComponent(file)}`;
  // Color: texture-mq.jpg (medium quality, ~1MB)
  texLoader.load(`${baseUrl}/texture-mq.jpg`, tex => {
    tex.colorSpace = THREE.SRGBColorSpace; tex.flipY = false;
    groundMat.map = tex; groundMat.color.setHex(0xffffff); groundMat.needsUpdate = true;
  }, undefined, () => console.warn('no texture-mq for', scriptName));
  // Displacement: height.png. Three.js doesn't recompute vertex normals after
  // displacementMap moves them, so without a NORMAL MAP the surface still
  // shades as if it were flat — light reflects identically across the whole
  // plane, hills are invisible at default zoom (only visible in silhouette).
  // We fix this by deriving a normal map from the heightmap on the fly via
  // a 3×3 sobel filter on a canvas, and feeding it into the same material.
  fetch(`${baseUrl}/height.png`).then(r => r.blob()).then(createImageBitmap).then(bm => {
    // Displacement texture: directly from the bitmap.
    const dispTex = new THREE.CanvasTexture(bitmapToCanvas(bm));
    dispTex.flipY = true;
    groundMat.displacementMap = dispTex;
    // Normal map: sobel-derive per-pixel slope from the heightmap pixels.
    // Strength controls how exaggerated the bumps look in light reflection.
    const normCanvas = heightmapToNormalMap(bm, /*strength=*/ HEIGHT_SCALE / 64);
    const normTex = new THREE.CanvasTexture(normCanvas);
    normTex.flipY = true;
    groundMat.normalMap = normTex;
    // flatShading conflicts with normalMap (it overrides per-vertex normals).
    // Switch to smooth shading so the normalMap's per-pixel normals actually
    // light the surface.
    groundMat.flatShading = false;
    groundMat.needsUpdate = true;
  }).catch(e => console.warn('no height.png for', scriptName, e.message));
}

function bitmapToCanvas(bm) {
  const c = document.createElement('canvas');
  c.width = bm.width; c.height = bm.height;
  c.getContext('2d').drawImage(bm, 0, 0);
  return c;
}

// Sobel 3x3 height→normal: each output pixel encodes the surface normal
// at that height-sample as RGB = (nx*0.5+0.5, ny*0.5+0.5, nz*0.5+0.5).
function heightmapToNormalMap(bm, strength) {
  const w = bm.width, h = bm.height;
  const src = document.createElement('canvas'); src.width = w; src.height = h;
  src.getContext('2d').drawImage(bm, 0, 0);
  const sx = src.getContext('2d').getImageData(0, 0, w, h).data;
  const dst = document.createElement('canvas'); dst.width = w; dst.height = h;
  const dctx = dst.getContext('2d');
  const out = dctx.createImageData(w, h);
  const at = (x, y) => sx[((y * w) + x) * 4];     // R = grayscale luma
  for (let y = 0; y < h; y++) for (let x = 0; x < w; x++) {
    const xm = Math.max(0, x-1), xp = Math.min(w-1, x+1);
    const ym = Math.max(0, y-1), yp = Math.min(h-1, y+1);
    // Sobel-like dx, dy (signed)
    const dx = (at(xp, ym) + 2*at(xp, y) + at(xp, yp))
             - (at(xm, ym) + 2*at(xm, y) + at(xm, yp));
    const dy = (at(xm, yp) + 2*at(x, yp) + at(xp, yp))
             - (at(xm, ym) + 2*at(x, ym) + at(xp, ym));
    const nx = -dx * strength / 1024;  // /1024 to normalize sobel sum scale
    const ny = -dy * strength / 1024;
    const nz = 1.0;
    const inv = 1 / Math.hypot(nx, ny, nz);
    const o = (y * w + x) * 4;
    out.data[o    ] = (nx * inv * 0.5 + 0.5) * 255;
    out.data[o + 1] = (ny * inv * 0.5 + 0.5) * 255;
    out.data[o + 2] = (nz * inv * 0.5 + 0.5) * 255;
    out.data[o + 3] = 255;
  }
  dctx.putImageData(out, 0, 0);
  return dst;
}

function fitMap(x, z) {
  mapX = x; mapZ = z;
  ground.geometry.dispose();
  ground.geometry = new THREE.PlaneGeometry(mapX, mapZ);
  ground.position.set(mapX/2, 0, mapZ/2);
  // Camera default: 60° down (instead of nearly horizontal), closer.
  // Eye at (mapX/2, h, mapZ/2 + h*0.5) where h is sized to fit the map.
  const span = Math.max(mapX, mapZ);
  const h = span * 0.65;
  cam.position.set(mapX/2, h, mapZ/2 + h * 0.45);
  ctrl.target.set(mapX/2, 0, mapZ/2);
  ctrl.maxDistance = span * 1.5;
  ctrl.update();
}

function resize() {
  const w = stage.clientWidth, h = stage.clientHeight;
  r.setSize(w, h, false);
  cam.aspect = w / h; cam.updateProjectionMatrix();
}
addEventListener('resize', resize); resize();

// ---- texture set per faction ----
// The icexuick GLBs are geometry-only; texture atlases live in the same
// repo's tex/ directory, named <faction>_{color,normal,other,team}.png.
// Mesh UVs already map into these atlases — just load them once per faction
// and assign to material.map / .normalMap / etc.
const TEX_BASE = 'https://cdn.jsdelivr.net/gh/icexuick/BAR-modelviewer@main/tex';
const factionTexCache = new Map();   // 'arm' -> Promise<{ color, normal, other, team }>
function getFactionTextures(faction) {
  if (!factionTexCache.has(faction)) {
    const load = (name, srgb=false) => new Promise((res, rej) => {
      texLoader.load(`${TEX_BASE}/${faction}_${name}.png`, t => {
        if (srgb) t.colorSpace = THREE.SRGBColorSpace;
        t.flipY = false;       // GLB UVs are GL-style
        res(t);
      }, undefined, rej);
    });
    factionTexCache.set(faction, Promise.all([
      load('color', true), load('normal'), load('other'), load('team'),
    ]).then(([color, normal, other, team]) => ({ color, normal, other, team }))
      .catch(e => { console.warn('faction tex load failed', faction, e); return null; }));
  }
  return factionTexCache.get(faction);
}
function defNameFaction(defName) {
  const p = defName.slice(0, 3);
  return (p === 'arm' || p === 'cor' || p === 'leg') ? p : null;
}

// ---- model cache ----
// One Object3D template per unit-def-name. Lazy fetched on first use.
const loader = new GLTFLoader();
const protoCache = new Map();      // defName -> Promise<Object3D>
const fallback = (radius) => {
  const m = new THREE.Mesh(
    new THREE.CylinderGeometry(radius || 12, radius || 12, 8, 12),
    new THREE.MeshStandardMaterial({ color: 0x666666 }));
  m.position.y = 4;
  return m;
};
function getProto(defName, radius) {
  if (!protoCache.has(defName)) {
    protoCache.set(defName, fetch(GLB(defName)).then(rsp => {
      if (!rsp.ok) throw new Error(`HTTP ${rsp.status} for ${defName}`);
      return rsp.arrayBuffer();
    }).then(buf => new Promise((res, rej) =>
      loader.parse(buf, '', g => res(g.scene), rej)
    )).catch(e => { console.warn(`fallback for ${defName}:`, e.message); return fallback(radius); }));
  }
  return protoCache.get(defName);
}

// ---- trace ----
let meta = null;          // { defs: { id -> {n, r} } }
let frames = [];          // [ { f, u: [[uid,team,def,x,z,hp], ...] } ]
const liveByUid = new Map();   // uid -> Object3D (cloned proto, in scene)

async function loadTraceFromText(text, label) {
  const lines = text.split('\n').filter(Boolean);
  meta = null; frames = []; liveByUid.forEach(o => scene.remove(o)); liveByUid.clear();
  for (const ln of lines) {
    let r; try { r = JSON.parse(ln); } catch { continue; }
    if (r.t === 'meta') {
      meta = r;
      fitMap(r.mapX || 4096, r.mapZ || 4096);
      setMapTexture(r.mapName);
    }
    else if (r.t === 'f') frames.push(r);
  }
  document.getElementById('status').textContent =
    `${label} — ${frames.length} frames, ${Object.keys(meta?.defs||{}).length} defs`;
  const sc = document.getElementById('scrub');
  sc.max = String(frames.length - 1); sc.value = '0'; sc.disabled = false;
  applyFrame(0);
}
async function loadTraceUrl(name) {
  const rsp = await fetch('/traces/' + encodeURIComponent(name));
  if (!rsp.ok) { document.getElementById('status').textContent = `HTTP ${rsp.status} loading ${name}`; return; }
  await loadTraceFromText(await rsp.text(), name);
}
async function populateDropdown() {
  let traces = [];
  try {
    const j = await (await fetch('/api/traces')).json();
    // Keep only the per-frame trace files (have a mapName + lastFrame).
    traces = (j.traces || []).filter(t => t.mapName && t.lastFrame > 0);
    // Default to the longest (most-frames) trace — much more interesting than
    // a 30-second probe.
    traces.sort((a, b) => b.lastFrame - a.lastFrame);
  } catch (_) {}
  const sel = document.getElementById('traceSel');
  sel.innerHTML = '';
  if (!traces.length) {
    sel.innerHTML = '<option>(no /api/traces — use file…)</option>';
    document.getElementById('status').textContent = 'no traces; use file…';
    return null;
  }
  for (const t of traces) {
    const opt = document.createElement('option');
    opt.value = t.name;
    opt.textContent = `${t.mapName} · ${t.lastFrame}f · ${(t.size/1e6).toFixed(1)}MB`;
    sel.appendChild(opt);
  }
  // Optional ?trace=<name> URL override (handy for screenshots / sharing).
  const qp = new URLSearchParams(location.search).get('trace');
  if (qp && traces.some(t => t.name === qp)) sel.value = qp;
  return sel.value;
}
document.getElementById('traceSel').addEventListener('change', e => loadTraceUrl(e.target.value));
document.getElementById('filePick').addEventListener('click', () => document.getElementById('trace').click());
document.getElementById('trace').addEventListener('change', async e => {
  const f = e.target.files[0]; if (f) await loadTraceFromText(await f.text(), f.name);
});
// auto-load on page-ready
const initial = await populateDropdown();
if (initial) await loadTraceUrl(initial);

// ---- frame application ----
async function applyFrame(idx) {
  const fr = frames[idx]; if (!fr) return;
  document.getElementById('frameLabel').textContent = `f=${fr.f}`;
  const seen = new Set();
  for (const u of (fr.u || [])) {
    // Trace formats:
    //   v1 (6 fields): [uid, team, def, x, z, hp]
    //   v2 (8 fields): [..., y, heading_short]   (heading is signed 16-bit
    //                  TA-angle; *(pi/32768) → radians)
    const [uid, team, defId, x, z, _hp, y, heading] = u;
    seen.add(uid);
    let obj = liveByUid.get(uid);
    if (!obj) {
      const def = meta.defs[String(defId)];
      if (!def) continue;
      const proto = await getProto(def.n, def.r);
      obj = new THREE.Group();
      const model = proto.clone(true);
      model.scale.setScalar(UNIT_SCALE);
      // Apply the per-faction texture atlas (color/normal/other) to every
      // mesh in this unit — the GLB's UVs already map into the atlas, so
      // each mesh ends up wearing the right region. Async: kick the fetch
      // and assign once it lands.
      const faction = defNameFaction(def.n);
      if (faction) {
        getFactionTextures(faction).then(tex => {
          if (!tex) return;
          model.traverse(o => {
            if (o.isMesh && o.material && o.material.color) {
              const m = o.material.clone();
              m.map        = tex.color;
              m.normalMap  = tex.normal;
              m.roughnessMap = tex.other;   // BAR packs rough/metal/team in 1
              m.metalnessMap = tex.other;
              m.color.setHex(0xffffff);     // let the texture show as-is
              m.metalness = 1.0;
              m.roughness = 1.0;
              m.needsUpdate = true;
              o.material = m;
            }
          });
        });
      }
      obj.add(model);
      // Team-colored disk on the ground beneath the unit — radius scales
      // along with the model so it stays in proportion.
      const r = Math.max(def.r * UNIT_SCALE * 1.05, 8 * UNIT_SCALE);
      const ringGeom = new THREE.CircleGeometry(r, 24);
      const ringMat  = new THREE.MeshBasicMaterial({
        color: TEAM_COLORS[team % TEAM_COLORS.length],
        transparent: true, opacity: 0.7, depthWrite: false,
      });
      const ring = new THREE.Mesh(ringGeom, ringMat);
      ring.rotation.x = -Math.PI / 2;
      ring.position.y = 1.0;
      obj.add(ring);
      scene.add(obj);
      liveByUid.set(uid, obj);
    }
    obj.position.set(x, UNITS_FLAT ? 0 : (y || 0), z);
    if (heading !== undefined) obj.rotation.y = heading * Math.PI / 32768;
  }
  // Remove units no longer present
  for (const [uid, obj] of liveByUid) {
    if (!seen.has(uid)) { scene.remove(obj); liveByUid.delete(uid); }
  }
}

document.getElementById('scrub').addEventListener('input', e =>
  applyFrame(+e.target.value));

// ---- play ----
let playing = false; let playT = 0;
const playBtn = document.getElementById('play');
playBtn.addEventListener('click', () => {
  playing = !playing; playBtn.textContent = playing ? '⏸' : '▶';
});

// ---- render loop ----
function tick(now) {
  if (playing && frames.length) {
    if (!playT) playT = now;
    const dt = (now - playT) / 1000;
    if (dt > 1/30) {  // 30 frames/sec scrubbing
      const sc = document.getElementById('scrub');
      const next = (+sc.value + 1) % frames.length;
      sc.value = String(next); applyFrame(next);
      playT = now;
    }
  } else playT = 0;
  ctrl.update(); r.render(scene, cam); requestAnimationFrame(tick);
}
requestAnimationFrame(tick);
</script>
</body></html>
